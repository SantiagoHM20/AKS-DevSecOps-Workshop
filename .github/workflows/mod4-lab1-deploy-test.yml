name: Deploy to AKS (Test)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: Environment-Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.TEST_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TEST_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TEST_AZURE_SUBSCRIPTION_ID }}

      - name: Show variables (debug)
        run: |
          echo "AKS Cluster: ${{ vars.TEST_AKS_CLUSTER_NAME }}"
          echo "ACR: ${{ vars.TEST_AZURE_CONTAINER_REGISTRY }}"
          echo "Resource Group: ${{ vars.TEST_RESOURCE_GROUP }}"
          echo "Manifest Path: ${{ vars.TEST_MANIFEST_PATH }}"

      - name: Login to ACR
        run: |
          az acr login --name ${{ vars.TEST_AZURE_CONTAINER_REGISTRY }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ vars.TEST_RESOURCE_GROUP }} \
            --name ${{ vars.TEST_AKS_CLUSTER_NAME }}

      - name: Deploy manifest
        run: |
          kubectl apply -f ${{ vars.TEST_MANIFEST_PATH }}